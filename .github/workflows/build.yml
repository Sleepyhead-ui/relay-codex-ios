name: Build Relay

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  bridge:
    name: Test Windows bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bridge
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Bridge/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run test:e2e
      - run: npm audit --omit=dev

  ios:
    name: Build unsigned IPA for TrollStore
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate app icons and Xcode project
        working-directory: iOS
        run: |
          swift Tools/GenerateAppIcons.swift
          xcodegen generate
      - name: Run iOS state tests
        working-directory: iOS
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(device["udid"] for runtime in data["devices"].values() for device in runtime if device["name"].startswith("iPhone")))')
          xcodebuild \
            -project Relay.xcodeproj \
            -scheme Relay \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO \
            test
      - name: Build iPhone app
        working-directory: iOS
        run: |
          xcodebuild \
            -project Relay.xcodeproj \
            -scheme Relay \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - name: Package IPA
        working-directory: iOS
        run: |
          rm -rf Payload Relay.ipa
          mkdir Payload
          cp -R build/Build/Products/Release-iphoneos/Relay.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload Relay.ipa
          shasum -a 256 Relay.ipa | awk '{print $1 "  Relay.ipa"}' > Relay.ipa.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: Relay-unsigned-IPA
          path: |
            iOS/Relay.ipa
            iOS/Relay.ipa.sha256
          if-no-files-found: error
      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            iOS/Relay.ipa
            iOS/Relay.ipa.sha256
          generate_release_notes: true

  desktop:
    name: Build Relay Desktop for Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Desktop
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            Desktop/package-lock.json
            Bridge/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: Bridge
      - run: npm test
      - run: npm run test:performance
      - run: npm run dist
      - uses: actions/upload-artifact@v7
        with:
          name: Relay-Desktop-Windows
          path: |
            Desktop/release/*.exe
            Desktop/release/*.blockmap
            Desktop/release/latest*.yml
          if-no-files-found: error
      - name: Attach Windows builds to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Desktop/release/*.exe
            Desktop/release/*.blockmap
            Desktop/release/latest*.yml
          generate_release_notes: true
