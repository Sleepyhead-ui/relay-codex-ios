name: Build Relay

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  bridge:
    name: Test Windows bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Bridge/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run test:e2e
      - run: npm audit --omit=dev

  ios:
    name: Build unsigned IPA for TrollStore
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate app icons and Xcode project
        working-directory: iOS
        run: |
          swift Tools/GenerateAppIcons.swift
          xcodegen generate
      - name: Build iPhone app
        working-directory: iOS
        run: |
          xcodebuild \
            -project Relay.xcodeproj \
            -scheme Relay \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - name: Package IPA
        working-directory: iOS
        run: |
          rm -rf Payload Relay.ipa
          mkdir Payload
          cp -R build/Build/Products/Release-iphoneos/Relay.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload Relay.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: Relay-unsigned-IPA
          path: iOS/Relay.ipa
          if-no-files-found: error
      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iOS/Relay.ipa
          generate_release_notes: true
